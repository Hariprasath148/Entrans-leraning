<div *ngIf="questionStatus" class="question-container-wrapper">
    <div class="question-wrapper">
        <app-question *ngFor="let question of questions.questions" [question]="question" [isSubmitted]="questions.isSubmitted" (getChildAnswer)="setAnswer($event)"></app-question>
        <button (click)="sumitAnswer()" class="submit-btn">Submit</button>     
    </div>
</div>
